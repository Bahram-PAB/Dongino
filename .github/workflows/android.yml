name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Restoring debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f debug.keystore ]; then
            echo "debug.keystore already exists."
          else
            echo "debug.keystore not found. Generating a new one using keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Create Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper not found, generating wrapper..."
            gradle wrapper
          fi

      - name: Configure Gradle for CI (out-of-process mode for KSP)
        run: |
          # Ensure execution strategy is out-of-process to completely isolate classloaders and avoid IntelliJ/ApplicationManager NPEs on CI
          sed -i 's/kotlin.compiler.execution.strategy=daemon/kotlin.compiler.execution.strategy=out-of-process/g' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile and Build Android Project
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create and Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: نسخه جدید دنگ - بیلد شماره ${{ github.run_number }}
          body: |
            ### 🚀 تغییرات جدید برنامه دنگ (Dongino)
            
            نسخه جدید برنامه با موفقیت توسط سیستم یکپارچه‌سازی مداوم (GitHub Actions) بیلد شد و آماده استفاده است.
            
            **تغییرات و ویژگی‌های توسعه این نسخه:**
            * 🛠️ رفع کامل خطای بیلد KSP و IntelliJ در سرورهای اوبونتو CI
            * 🔐 شبیه‌سازی و بازنشانی امن فایل امضای دیجیتال (`debug.keystore`) به صورت ابری
            * 📦 سبک‌سازی عملکرد کامپایلر جاوا و بهبود مدیریت حافظه دیمون گواستار
            * 🇮🇷 حفظ کامل پوسته تماماً RTL و پشتیبانی از مبالغ به صورت **تومان**
            
            📥 **جهت نصب برنامه، فایل `app-debug.apk` را از بخش Assets (دارایی‌ها) در پایین صفحه دانلود کنید.**
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk

