name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Create Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper not found, generating wrapper..."
            gradle wrapper
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile and Build Android Project
        run: ./gradlew assembleDebug
