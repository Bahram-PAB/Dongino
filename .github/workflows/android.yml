name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Restoring debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found."
          fi

      - name: Create Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper not found, generating wrapper..."
            gradle wrapper
          fi

      - name: Configure Gradle for CI (out-of-process mode for KSP)
        run: |
          # Ensure execution strategy is out-of-process to completely isolate classloaders and avoid IntelliJ/ApplicationManager NPEs on CI
          sed -i 's/kotlin.compiler.execution.strategy=daemon/kotlin.compiler.execution.strategy=out-of-process/g' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile and Build Android Project
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache
